[project]
name = "django-rss-reader"
version = "0.1.0"
description = "Add your description here"
requires-python = ">=3.13"
dependencies = [
    "beautifulsoup4>=4.14.2",
    "brotli>=1.1.0",
    "celery>=5.5.3",
    "celery-types==0.23.0",
    "dateparser>=1.2.2",
    "django>=5.2.6",
    "django-celery-results>=2.6.0",
    "django-htmx>=1.26.0",
    "docutils>=0.22",
    "lxml>=6.0.1",
    "psycopg2-binary>=2.9.11",
    "pyopml>=1.0.0",
    "python-dateutil>=2.9.0.post0",
]
[dependency-groups]
dev = [
    "django-debug-toolbar>=6.0.0",
    "django-stubs>=5.2.7",
    {include-group = "test"},
]
test = [
    "coverage>=7.10.6",
]
