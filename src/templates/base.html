{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/png" href="{% static 'images/favicon.ico' %}"/>

    {% block styles %}
        <link rel="stylesheet" href="{% static 'css/index_styles.css' %}">
        <link rel="stylesheet" href="{% static 'css/feeds_styles.css' %}">
        <link rel="stylesheet" href="{% static 'css/entries_styles.css' %}">
    {% endblock styles %}

    <script src="{% static 'js/htmx_2.0.7.min.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>

    <title>{% block title %}Django rss reader{% endblock %}</title>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

{% block content %}

{% endblock content %}

</body>
</html>
