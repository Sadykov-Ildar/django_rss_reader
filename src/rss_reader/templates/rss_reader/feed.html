{% load static %}
<div class="feed" id="feed-{{ feed.pk }}">
    <a href=""
       hx-get="{% url "rss_reader:entries" feed.pk %}"
       hx-swap="innerHTML show:top"
       hx-target="#entries_list"
    >{{ feed.title }}</a>

    <a href="{{ feed.site_url }}">link</a>

    <a href=""
       hx-delete="{% url "rss_reader:feed" feed.pk %}"
       hx-swap="outerHTML swap:500ms"
       hx-target="#feed-{{ feed.pk }}"
    >
        DELETE
        <div class="htmx-indicator">
            <img src="{% static 'images/bars.svg' %}" alt="loading" style="width: 1rem">
        </div>
    </a>

</div>
