{% load static %}
<div class="sidebar_header">
    <span>Your feeds</span>
    <div class="sidebar_buttons">
        {# TODO: нужна обратная связь, и блокировка кнопки на время запроса #}
        <div hx-get="{% url "rss_reader:refresh_feeds" %}"
             hx-swap="none"
             hx-disabled-elt="this"
             class="image_button">
            <img src="{% static 'images/refresh.png' %}" alt="refresh all feeds" style="width: 1rem">
        </div>
        <div hx-get="{% url "rss_reader:mark_feeds_as_read" %}"
             hx-swap="none"
             hx-disabled-elt="this"
             class="image_button">
            <img src="{% static 'images/mark_green.png' %}" alt="mark all feeds as read" style="width: 1rem">
        </div>

        <div hx-get="{% url "rss_reader:add_feed_modal" %}"
             hx-target="body" hx-swap="beforeend"
             class="image_button">
            <img src="{% static 'images/add.png' %}" alt="add new feed" style="width: 1rem">
        </div>
    </div>

</div>
