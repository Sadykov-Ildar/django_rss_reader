name: rss_reader
services:
  app:
    extends:
      file: common.yml
      service: with_db_config
    container_name: app
    expose:
      - 8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_network
      - db_network
      - redis_network
    develop:
      watch:
        - path: ./src
          action: sync+restart
          target: /app

  tests:
    extends:
      file: common.yml
      service: with_db_config
    container_name: test
    build:
      target: test
      args:
        UV_BUILD_ARG: --group test
    command: pytest
    profiles: ["test"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - db_network
      - redis_network

  celery_worker:
    extends:
      file: common.yml
      service: with_db_config
    container_name: celery_worker
    command: python -m celery -A django_rss_reader worker --loglevel=INFO --concurrency=1 -Q celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - db_network
      - redis_network

  celery_beat:
    build:
      context: ./celery_beat
      dockerfile: ./Dockerfile
      cache_from:
        - type=local,src=${UV_CACHE_DIR}
      args:
        UV_BUILD_ARG: ${UV_BUILD_ARG}
    container_name: celery_beat
    command: python -m celery -A run beat
    depends_on:
      redis:
        condition: service_started
    networks:
      - redis_network

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf
      - ${DATA_VOLUME}:/var/www/html/
    depends_on:
      - app
    networks:
      - app_network

  postgres:
    image: postgres:18
    container_name: postgres
    volumes:
      - ${POSTGRES_VOLUME}:/var/lib/postgresql/
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - '127.0.0.1:5433:5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 30s
      start_interval: 1s
      start_period: 10s
      timeout: 2s
      retries: 5
    networks:
      - db_network
    secrets:
      - db_password

  redis:
    container_name: redis
    image: redis:latest
    networks:
      - redis_network
    volumes:
      - redis_data:/data

volumes:
  redis_data:

networks:
  db_network:
  redis_network:
  app_network:

secrets:
  db_password:
    file: db_password.txt
  django_secret_key:
    file: django_secret_key.txt
